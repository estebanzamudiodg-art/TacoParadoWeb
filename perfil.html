<div class="container">
  <div class="brand-header">
    <div class="mark">TACO <span class="accent">PARADO</span></div>
    <div class="tagline">MEMBER · FIDELIZACIÓN</div>

  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p style="font-family: 'Space Mono', monospace; letter-spacing: 2px; font-size: 12px; color: var(--tp-orange);">CARGANDO PERFIL…</p>

<script>
// Leer ID de la URL
const params = new URLSearchParams(window.location.search);
const memberId = params.get('id');
let brandLogoUrl = null;

async function cargarLogo() {
  try {
    const { data } = await window.supabase.from('config').select('value').eq('key', 'logoUrl').maybeSingle();
    if (data?.value) brandLogoUrl = data.value;
  } catch (e) { /* silent */ }
}

function defaultTacoSVG() {
  // Si hay logo configurado, usarlo
  if (brandLogoUrl) return brandLogoUrl;

  const svg = `<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'>
    <circle cx='100' cy='100' r='85' fill='%235271FF' stroke='%231A3F91' stroke-width='4'/>
    <ellipse cx='100' cy='115' rx='48' ry='38' fill='%23FFD24D' stroke='%231A3F91' stroke-width='3'/>
    <path d='M 58 105 Q 70 90, 85 95 Q 100 85, 115 95 Q 130 88, 142 105 L 140 108 Q 125 100, 115 108 Q 100 98, 85 108 Q 70 102, 60 108 Z' fill='%235BAE4C' stroke='%231A3F91' stroke-width='2'/>
    <circle cx='88' cy='122' r='8' fill='%23fff' stroke='%231A3F91' stroke-width='2'/>
    <circle cx='112' cy='122' r='8' fill='%23fff' stroke='%231A3F91' stroke-width='2'/>
    <circle cx='90' cy='124' r='3.5' fill='%231A3F91'/>
    <circle cx='114' cy='124' r='3.5' fill='%231A3F91'/>
    <path d='M 90 138 Q 100 146, 110 138' stroke='%231A3F91' stroke-width='2.5' fill='none' stroke-linecap='round'/>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + svg;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function formatFecha(fecha) {
  if (!fecha) return '';
  const d = new Date(fecha);
  const meses = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  return meses[d.getMonth()] + ' ' + d.getFullYear();
}

function normalizarInstagram(input) {
  if (!input) return null;
  let v = input.trim();
  if (!v) return null;
  v = v.replace(/\s+/g, '');
  if (v.startsWith('@')) {
    const user = v.slice(1).replace(/[^a-zA-Z0-9._]/g, '');
    return user ? `https://instagram.com/${user}` : null;
  }
  v = v.replace(/^https?:\/\//i, '').replace(/^www\./i, '');
  if (v.toLowerCase().startsWith('instagram.com/') || v.toLowerCase().startsWith('instagr.am/')) {
    const path = v.split('/').slice(1).join('/').split('?')[0].split('#')[0];
    const user = path.replace(/\/$/, '').replace(/[^a-zA-Z0-9._]/g, '');
    return user ? `https://instagram.com/${user}` : null;
  }
  if (/^[a-zA-Z0-9._]+$/.test(v)) {
    return `https://instagram.com/${v}`;
  }
  return null;
}

// Beneficios por nivel
const beneficiosPorTier = {
  bronce: [
    { icon: '🎂', title: 'Taco gratis de cumpleaños', desc: 'Reclama tu taco favorito el día de tu cumpleaños' },
    { icon: '📱', title: 'Notificaciones exclusivas', desc: 'Entérate primero de nuevas sedes y promociones' }
  ],
  plata: [
    { icon: '🎂', title: 'Taco gratis de cumpleaños', desc: 'Reclama tu taco favorito el día de tu cumpleaños' },
    { icon: '🥤', title: 'Bebida gratis cada 5 visitas', desc: 'Acumula visitas y reclama tu bebida' },
    { icon: '📱', title: 'Notificaciones exclusivas', desc: 'Promociones antes que nadie' }
  ],
  oro: [
    { icon: '🌮', title: 'Combo gratis de cumpleaños', desc: 'Combo completo el día de tu cumpleaños' },
    { icon: '🥤', title: 'Bebida gratis cada 3 visitas', desc: 'Más visitas, más beneficios' },
    { icon: '⚡', title: 'Fila rápida', desc: 'Pase preferencial en horas pico' },
    { icon: '🎁', title: 'Sorpresas mensuales', desc: 'Regalo exclusivo cada mes como miembro ORO' }
  ],
  master: [
    { icon: '👑', title: 'Beneficios ORO ilimitados', desc: 'Todos los beneficios del nivel ORO sin restricción' },
    { icon: '🌮', title: 'Combo gratis mensual', desc: 'Un combo completo gratis cada mes' },
    { icon: '⚡', title: 'Fila rápida siempre', desc: 'Prioridad en todas las sedes' },
    { icon: '🎉', title: 'Invitaciones VIP', desc: 'Acceso a eventos y lanzamientos exclusivos' },
    { icon: '🤝', title: 'Atención personalizada', desc: 'Tu pedido, como lo prefieras' }
  ]
};

const tierNames = {
  bronce: '★ BRONCE',
  plata: '★★ PLATA',
  oro: '★★★ ORO',
  master: '♛ MASTER'
};

async function cargarPerfil() {
  if (!memberId) {
    mostrarError('ID no proporcionado', 'La URL no contiene un identificador de miembro válido.');
    return;
  }

  // Esperar a que supabase cargue
  while (!window.supabase) {
    await new Promise(r => setTimeout(r, 50));
  }

  // Cargar logo de marca primero
  await cargarLogo();

  try {
    const { data, error } = await window.supabase
      .from('clientes')
      .select('*')
      .eq('id', memberId)
      .maybeSingle();

    if (error) throw error;

    if (!data) {
      mostrarError('Perfil no encontrado', `No existe un miembro con ID <strong>${escapeHtml(memberId)}</strong>.<br><br>Verifica que el QR esté bien escaneado o contacta al equipo de Taco Parado.`);
      return;
    }

    mostrarPerfil(data);
  } catch (err) {
    console.error(err);
    mostrarError('Error al cargar', 'Hubo un problema conectando con el servidor. Intenta de nuevo en unos segundos.');
  }
}

function mostrarPerfil(c) {
  const tierClass = 'tier-' + c.tier;
  const beneficios = beneficiosPorTier[c.tier] || beneficiosPorTier.bronce;
  const imagen = c.imagen || defaultTacoSVG();
  const ig = normalizarInstagram(c.instagram);
  const fechaAlta = formatFecha(c.alta);

  let igButton = '';
  if (ig) {
    const user = ig.replace('https://instagram.com/', '');
    igButton = `
      <div class="cta-footer">
        <p>Conecta con este miembro</p>
        <a href="${ig}" target="_blank" rel="noopener" class="ig-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
          Seguir @${escapeHtml(user)}
        </a>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = `
    <div class="member-card">
      <div class="tier-ribbon ${tierClass}">${tierNames[c.tier]}</div>
      <div class="mascot-big">
        <img src="${imagen}" alt="Personaje del miembro">
      </div>
      <div class="member-name">${escapeHtml(c.nombre)}</div>
      <div class="member-label">CLIENTE FIEL TACO PARADO</div>
      <div class="id-card">
        <div>
          <div class="id-label-tag">ID MIEMBRO</div>
          <div class="id-big">${c.id}</div>
        </div>
        <div style="text-align: right;">
          <div style="font-family: 'Space Mono', monospace; font-size: 9px; color: var(--tp-orange); letter-spacing: 1.5px; font-weight: 700;">MIEMBRO DESDE</div>
          <div style="font-family: 'Archivo Black', sans-serif; font-size: 14px; color: #fff; letter-spacing: 1px;">${fechaAlta}</div>
        </div>
      </div>
    </div>

    <div class="info-section">
      <h3>🎁 TUS BENEFICIOS</h3>
      ${beneficios.map(b => `
        <div class="benefit-item">
          <div class="benefit-icon">${b.icon}</div>
          <div class="benefit-text">
            <div class="benefit-title">${b.title}</div>
            <div class="benefit-desc">${b.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="info-section">
      <h3>📍 ¿CÓMO USAR TU CARNET?</h3>
      <div class="benefit-item">
        <div class="benefit-icon">1️⃣</div>
        <div class="benefit-text">
          <div class="benefit-title">Presenta tu carnet</div>
          <div class="benefit-desc">Muéstralo al cajero antes de pagar en cualquier sede Taco Parado.</div>
        </div>
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">2️⃣</div>
        <div class="benefit-text">
          <div class="benefit-title">Acumula visitas</div>
          <div class="benefit-desc">Cada vez que vengas sumamos una visita a tu cuenta.</div>
        </div>
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">3️⃣</div>
        <div class="benefit-text">
          <div class="benefit-title">Reclama tus premios</div>
          <div class="benefit-desc">Cuando tengas las visitas necesarias, reclama tu beneficio.</div>
        </div>
      </div>
    </div>

    ${igButton}

    <div class="cta-footer">
      <p style="margin-top: 20px;">SÍGUENOS EN REDES</p>

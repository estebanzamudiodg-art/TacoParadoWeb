  /* ===== BOTÓN COMPARTIR ===== */
  .share-btn {

<body>

<div class="container">
  <div class="header-bar">
    <div class="brand-mini">TACO <span class="acc">PARADO</span></div>
    <button class="logout" onclick="logout()">SALIR</button>
  </div>

  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p style="font-family: 'Space Mono', monospace; letter-spacing: 2px; font-size: 12px; color: var(--tp-orange);">CARGANDO TU CARNET…</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let cliente = null;
let brandLogoUrl = null;
let umbralesConfig = { plata: 5, oro: 10, master: 20 };
let sedeInfo = {
  nombre: 'Taco Parado',
  direccion: '',
  horario: '',
  mapsUrl: ''
};
const PUBLIC_PROFILE_BASE = window.location.origin + window.location.pathname.replace(/\/mi-carnet\.html$/, '') + '/perfil.html?id=';

async function waitForSupabase() {
  while (!window.supabase) await new Promise(r => setTimeout(r, 50));
}

async function cargarLogo() {
  try {
    const { data } = await window.supabase.from('config').select('value').eq('key', 'logoUrl').maybeSingle();
    if (data?.value) brandLogoUrl = data.value;
  } catch (e) { /* silent */ }
}

async function cargarUmbrales() {
  try {
    const { data } = await window.supabase.from('config').select('key, value').in('key', ['tierPlataMin', 'tierOroMin', 'tierMasterMin']);
    (data || []).forEach(r => {
      if (r.key === 'tierPlataMin') umbralesConfig.plata = parseInt(r.value) || 5;
      if (r.key === 'tierOroMin') umbralesConfig.oro = parseInt(r.value) || 10;
      if (r.key === 'tierMasterMin') umbralesConfig.master = parseInt(r.value) || 20;
    });
  } catch (e) { /* silent */ }
}

function progresoTier(visitas) {
  if (visitas < umbralesConfig.plata) {
    return { siguiente: 'plata', desde: 0, hasta: umbralesConfig.plata, faltan: umbralesConfig.plata - visitas, progreso: Math.round((visitas / umbralesConfig.plata) * 100) };
  } else if (visitas < umbralesConfig.oro) {
    return { siguiente: 'oro', desde: umbralesConfig.plata, hasta: umbralesConfig.oro, faltan: umbralesConfig.oro - visitas, progreso: Math.round(((visitas - umbralesConfig.plata) / (umbralesConfig.oro - umbralesConfig.plata)) * 100) };
  } else if (visitas < umbralesConfig.master) {
    return { siguiente: 'master', desde: umbralesConfig.oro, hasta: umbralesConfig.master, faltan: umbralesConfig.master - visitas, progreso: Math.round(((visitas - umbralesConfig.oro) / (umbralesConfig.master - umbralesConfig.oro)) * 100) };
  } else {
    return { siguiente: null, desde: umbralesConfig.master, hasta: umbralesConfig.master, faltan: 0, progreso: 100 };
  }
}

async function cargarSede() {
  try {
    const { data } = await window.supabase.from('config').select('key, value').in('key', ['sedeNombre', 'sedeDireccion', 'sedeHorario', 'sedeMapsUrl']);
    (data || []).forEach(r => {
      if (r.key === 'sedeNombre') sedeInfo.nombre = r.value;
      if (r.key === 'sedeDireccion') sedeInfo.direccion = r.value;
      if (r.key === 'sedeHorario') sedeInfo.horario = r.value;
      if (r.key === 'sedeMapsUrl') sedeInfo.mapsUrl = r.value;
    });
  } catch (e) { /* silent */ }
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function mascotaLogo() {
  if (brandLogoUrl) {
    return `<img src="${brandLogoUrl}" alt="Logo" style="width:100%; height:100%; object-fit:contain;">`;
  }
  return tacoSVG();
}

function tacoSVG() {
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <circle cx='100' cy='100' r='85' fill='#5271FF' stroke='#1A3F91' stroke-width='4'/>
    <ellipse cx='100' cy='115' rx='48' ry='38' fill='#FFD24D' stroke='#1A3F91' stroke-width='3'/>
    <path d='M 58 105 Q 70 90, 85 95 Q 100 85, 115 95 Q 130 88, 142 105 L 140 108 Q 125 100, 115 108 Q 100 98, 85 108 Q 70 102, 60 108 Z' fill='#5BAE4C' stroke='#1A3F91' stroke-width='2'/>
    <circle cx='88' cy='122' r='8' fill='#fff' stroke='#1A3F91' stroke-width='2'/>
    <circle cx='112' cy='122' r='8' fill='#fff' stroke='#1A3F91' stroke-width='2'/>
    <circle cx='90' cy='124' r='3.5' fill='#1A3F91'/>
    <circle cx='114' cy='124' r='3.5' fill='#1A3F91'/>
    <path d='M 90 138 Q 100 146, 110 138' stroke='#1A3F91' stroke-width='2.5' fill='none' stroke-linecap='round'/>
    <path d='M 135 95 Q 148 80, 152 60' stroke='#FFD24D' stroke-width='8' fill='none' stroke-linecap='round'/>
    <path d='M 135 95 Q 148 80, 152 60' stroke='#1A3F91' stroke-width='2' fill='none' stroke-linecap='round'/>
    <circle cx='152' cy='55' r='10' fill='#B8D84A' stroke='#1A3F91' stroke-width='2'/>
  </svg>`;
}

const beneficiosPorTier = {
  bronce: [
    { icon: '🎂', title: 'Taco gratis de cumpleaños', desc: 'Reclama tu taco favorito el día de tu cumpleaños' },
    { icon: '📱', title: 'Notificaciones exclusivas', desc: 'Entérate primero de nuevas sedes y promociones' }
  ],
  plata: [
    { icon: '🎂', title: 'Taco gratis de cumpleaños', desc: 'Reclama tu taco favorito el día de tu cumpleaños' },
    { icon: '🥤', title: 'Bebida gratis cada 5 visitas', desc: 'Acumula visitas y reclama tu bebida' },
    { icon: '📱', title: 'Notificaciones exclusivas', desc: 'Promociones antes que nadie' }
  ],
  oro: [
    { icon: '🌮', title: 'Combo gratis de cumpleaños', desc: 'Combo completo el día de tu cumpleaños' },
    { icon: '🥤', title: 'Bebida gratis cada 3 visitas', desc: 'Más visitas, más beneficios' },
    { icon: '⚡', title: 'Fila rápida', desc: 'Pase preferencial en horas pico' },
    { icon: '🎁', title: 'Sorpresas mensuales', desc: 'Regalo exclusivo cada mes' }
  ],
  master: [
    { icon: '👑', title: 'Beneficios ORO ilimitados', desc: 'Todos los beneficios sin restricción' },
    { icon: '🌮', title: 'Combo gratis mensual', desc: 'Un combo completo cada mes' },
    { icon: '🎉', title: 'Invitaciones VIP', desc: 'Eventos y lanzamientos exclusivos' }
  ]
};

const tierNames = { bronce: '★ BRONCE', plata: '★★ PLATA', oro: '★★★ ORO', master: '♛ MASTER' };

window.logout = async function() {
  await window.supabase.auth.signOut();
  window.location.href = 'registro.html';
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.compartir = async function() {
  const url = PUBLIC_PROFILE_BASE + cliente.id;
  const texto = `¡Soy miembro de Taco Parado! 🌮 Mi ID: ${cliente.id}`;

  if (navigator.share) {
    try {
      await navigator.share({ title: 'Mi carnet Taco Parado', text: texto, url });
    } catch(e) { /* cancelado */ }
  } else {
    try {
      await navigator.clipboard.writeText(url);
      toast('✓ Link copiado al portapapeles');
    } catch {
      toast('No se pudo compartir');
    }
  }
};

async function cargarCarnet() {
  await waitForSupabase();
  await cargarLogo();
  await cargarSede();
  await cargarUmbrales();
  const { data: { session } } = await window.supabase.auth.getSession();

  if (!session) {
    window.location.href = 'registro.html';
    return;
  }

  currentUser = session.user;

  const { data, error } = await window.supabase
    .from('clientes')
    .select('*')
    .eq('user_id', currentUser.id)
    .maybeSingle();

  if (error || !data) {
    document.getElementById('content').innerHTML = `
      <div class="error-state">
        <div class="emoji">🌮</div>
        <h2>No encontramos tu registro</h2>
        <p>Parece que aún no completaste tu registro como miembro.</p>
        <a href="registro.html">COMPLETAR REGISTRO</a>
      </div>
    `;
    return;
  }

  cliente = data;
  mostrarCarnet();
}

function mostrarCarnet() {
  const c = cliente;
  const tierClass = 'tier-' + c.tier;
  const beneficios = beneficiosPorTier[c.tier] || beneficiosPorTier.bronce;
  const recienRegistrado = sessionStorage.getItem('tp_welcome') !== 'seen';
  sessionStorage.setItem('tp_welcome', 'seen');

  // Banner bienvenida si viene de registro
  const fromRegistro = document.referrer.includes('registro.html');
  const showWelcome = fromRegistro || recienRegistrado;

  // Bloque de progreso de visitas
  const visitasActuales = c.visitas_totales || 0;
  const prog = progresoTier(visitasActuales);
  const tierNombreSiguiente = { plata: '★★ PLATA', oro: '★★★ ORO', master: '♛ MASTER' }[prog.siguiente] || '';

  const visitasHTML = `
    <div style="background: linear-gradient(135deg, rgba(82,113,255,0.2) 0%, rgba(26,63,145,0.3) 100%); border: 2px solid rgba(82,113,255,0.4); border-radius: 16px; padding: 20px; margin-top: 18px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;">
        <div>
          <div style="font-family:'Space Mono',monospace; font-size:10px; color:var(--tp-orange); letter-spacing:1.8px; font-weight:700;">TUS VISITAS</div>
          <div style="font-family:'Bungee',sans-serif; font-size:38px; color:#fff; line-height:1; margin-top:4px;">${visitasActuales}</div>
        </div>
        ${prog.siguiente ? `
          <div style="text-align:right;">
            <div style="font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,0.7); letter-spacing:1.5px;">PRÓXIMO NIVEL</div>
            <div style="font-family:'Archivo Black',sans-serif; font-size:14px; color:var(--tp-orange); margin-top:2px;">${tierNombreSiguiente}</div>
            <div style="font-family:'Space Mono',monospace; font-size:10px; color:#fff; margin-top:2px; letter-spacing:0.5px;">
              Faltan <strong style="color:var(--tp-orange); font-size:14px;">${prog.faltan}</strong> visita${prog.faltan === 1 ? '' : 's'}
            </div>
          </div>
        ` : `
          <div style="text-align:right;">
            <div style="font-family:'Bungee',sans-serif; font-size:16px; color:var(--tp-orange); letter-spacing:1px;">👑 MÁXIMO</div>
            <div style="font-family:'Space Mono',monospace; font-size:10px; color:rgba(255,255,255,0.8); margin-top:3px; letter-spacing:0.5px;">
              ¡Eres VIP Taco Parado!
            </div>
          </div>
        `}
      </div>

      <div style="height:10px; background:rgba(255,255,255,0.15); border-radius:5px; overflow:hidden;">
        <div style="width:${prog.progreso}%; height:100%; background:linear-gradient(90deg, var(--tp-orange), #FFB84D); border-radius:5px; transition:width 0.6s; box-shadow:0 0 8px rgba(255,144,0,0.5);"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:6px; font-family:'Space Mono',monospace; font-size:9px; color:rgba(255,255,255,0.6); letter-spacing:1px;">
        <span>${prog.desde}</span>
        <span>${prog.progreso}%</span>
        <span>${prog.hasta}</span>
      </div>
    </div>
  `;

  // Estado del carnet: 3 casos
  // 1. carnet_entregado → ya lo tiene en físico
  // 2. carnet_habilitado && !entregado → admin lo habilitó, puede ir a recogerlo
  // 3. ninguno de los dos → sigue acumulando visitas
  let statusHTML;

  if (c.carnet_entregado) {
    // ESTADO 3: Entregado
    statusHTML = `
      <div class="status-card">
        <div class="status-icon delivered">✓</div>
        <div class="status-text">
          <div class="st-title">Carnet físico entregado</div>
          <div class="st-desc">Ya tienes tu tarjeta. Preséntala en cada visita para acumular beneficios.</div>
        </div>
      </div>
    `;
  } else if (c.carnet_habilitado) {
    // ESTADO 2: Habilitado - listo para recoger
    const mapsBtn = sedeInfo.mapsUrl ? `
      <a href="${sedeInfo.mapsUrl}" target="_blank" style="display:inline-flex; align-items:center; gap:6px; background:var(--tp-orange); color:#fff; padding:10px 16px; border-radius:10px; font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; text-decoration:none; letter-spacing:0.3px; box-shadow:0 4px 14px rgba(255,144,0,0.4); margin-top:10px;">
        📍 Cómo llegar
      </a>
    ` : '';

    statusHTML = `
      <div class="status-card" style="background: linear-gradient(135deg, rgba(255,144,0,0.25) 0%, rgba(255,144,0,0.15) 100%); border-color: var(--tp-orange); animation: pulse-ready 2s ease-in-out infinite; flex-direction: column; align-items: flex-start; padding: 20px;">
        <div style="display:flex; align-items:center; gap:14px; width:100%;">
          <div class="status-icon" style="background: var(--tp-orange); animation: bounce 1.5s ease-in-out infinite; flex-shrink:0;">🎉</div>
          <div class="status-text">
            <div class="st-title" style="color: var(--tp-orange); font-size: 15px;">¡Tu carnet está listo para recoger!</div>
            <div class="st-desc" style="color: #fff; margin-top: 2px;">Menciona tu ID <strong style="color: var(--tp-orange); font-family: 'Space Mono', monospace;">${c.id}</strong></div>
          </div>
        </div>

        <div style="width:100%; margin-top:14px; padding-top:14px; border-top:1px dashed rgba(255,144,0,0.4);">
          <div style="font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--tp-orange); font-weight:700; margin-bottom:6px;">📍 SEDE DE RECOGIDA</div>
          <div style="font-family:'Archivo Black',sans-serif; font-size:14px; color:#fff; line-height:1.3;">${escapeHtml(sedeInfo.nombre)}</div>
          ${sedeInfo.direccion ? `<div style="font-family:'Archivo',sans-serif; font-size:13px; color:rgba(255,255,255,0.9); margin-top:2px;">${escapeHtml(sedeInfo.direccion)}</div>` : ''}
          ${sedeInfo.horario ? `<div style="font-family:'Space Mono',monospace; font-size:11px; color:rgba(255,255,255,0.7); margin-top:4px; letter-spacing:0.5px;">🕒 ${escapeHtml(sedeInfo.horario)}</div>` : ''}
          ${mapsBtn}
        </div>
      </div>
      <style>
        @keyframes pulse-ready { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 144, 0, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(255, 144, 0, 0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      </style>
    `;
  } else {
    // ESTADO 1: Acumulando visitas - muestra mensaje motivacional
    statusHTML = `
      <div style="background: linear-gradient(135deg, rgba(26,63,145,0.2) 0%, rgba(82,113,255,0.12) 100%); border: 1.5px solid rgba(82,113,255,0.3); border-radius: 14px; padding: 16px 18px; margin: 14px 0; display: flex; align-items: center; gap: 14px;">
        <div style="width:42px; height:42px; background:var(--tp-blue); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;">💳</div>
        <div style="flex:1;">
          <div style="font-family:'Archivo Black',sans-serif; font-size:14px; color:#fff; letter-spacing:0.3px; line-height:1.3;">Carnet digital activo</div>
          <div style="font-family:'Space Mono',monospace; font-size:11px; color:rgba(255,255,255,0.75); margin-top:3px; letter-spacing:0.3px; line-height:1.5;">Muestra tu QR al personal para acumular visitas y subir de nivel</div>
        </div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = `
    ${showWelcome ? `
      <div class="success-banner">
        <span class="ico">🎉</span>
        <span class="txt">¡Bienvenido al club, ${escapeHtml(c.nombre.split(' ')[0])}!<br>Tu registro quedó completo.</span>
      </div>
    ` : ''}

    <div class="carnet">
      <div class="tier-ribbon ${tierClass}">${tierNames[c.tier]}</div>
      <div class="mascot-big">${mascotaLogo()}</div>
      <div class="member-name">${escapeHtml(c.nombre)}</div>
      <div class="member-label">CLIENTE FIEL TACO PARADO</div>
      <div class="id-card">
        <div>
          <div class="id-label-tag">ID MIEMBRO</div>
          <div class="id-big">${c.id}</div>
        </div>
        <div style="text-align: right;">
          <div style="font-family: 'Space Mono', monospace; font-size: 9px; color: var(--tp-orange); letter-spacing: 1.5px; font-weight: 700;">DESDE</div>
          <div style="font-family: 'Archivo Black', sans-serif; font-size: 13px; color: #fff; letter-spacing: 1px;">${c.alta.slice(5,7)}/${c.alta.slice(2,4)}</div>
        </div>
      </div>
    </div>

    ${statusHTML}

    <div class="qr-section">
      <h3>📱 TU CÓDIGO QR</h3>
      <div class="qr-box"><div id="qr-el"></div></div>
      <p class="qr-hint">Muéstralo en el local o compártelo con amigos.<br>Válido en todas las sedes.</p>
      <button class="share-btn" onclick="compartir()" style="margin-top: 14px;">📤 COMPARTIR MI CARNET</button>
    </div>

    ${visitasHTML}

    <div class="info-section">
      <h3>🎁 TUS BENEFICIOS</h3>
      ${beneficios.map(b => `
        <div class="benefit-item">
          <div class="benefit-icon">${b.icon}</div>
          <div>
            <div class="benefit-title">${b.title}</div>
            <div class="benefit-desc">${b.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="info-section">
      <h3>📍 ¿CÓMO USAR TU CARNET?</h3>
      <div class="benefit-item">
        <div class="benefit-icon">1️⃣</div>
        <div>
          <div class="benefit-title">Presenta tu carnet</div>
          <div class="benefit-desc">Muestra este QR o tu tarjeta física al cajero antes de pagar.</div>
        </div>
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">2️⃣</div>
        <div>
          <div class="benefit-title">Acumula visitas</div>
          <div class="benefit-desc">Cada vez que vengas sumamos una visita a tu cuenta.</div>
        </div>
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">3️⃣</div>
        <div>
          <div class="benefit-title">Reclama tus premios</div>
          <div class="benefit-desc">Cuando tengas las visitas necesarias, reclama tu beneficio.</div>
        </div>
      </div>
    </div>
  `;

  // Generar QR
  setTimeout(() => {
    const qrEl = document.getElementById('qr-el');
    if (qrEl) {
      new QRCode(qrEl, {
        text: PUBLIC_PROFILE_BASE + c.id,
        width: 360, height: 360,
        colorDark: '#1A3F91', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  }, 100);
}

cargarCarnet();
</script>
</body>
</html>
